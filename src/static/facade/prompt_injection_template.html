<div id="llmforge-facade-root" class="llmforge-facade-root" data-api-prefix="__API_PREFIX__">
  <div class="llmforge-facade-header">LLMForge Prompt Injection</div>
  <p class="llmforge-facade-sub">Use payloads to probe the selected level and verify discovered secrets.</p>

  <label class="llmforge-facade-label" for="llmforgePayload">Payload</label>
  <textarea id="llmforgePayload" class="llmforge-facade-textarea" placeholder="Enter payload for this level"></textarea>

  <div class="llmforge-facade-actions">
    <button id="llmforgeRunBtn" type="button">Submit Payload</button>
  </div>

  <label class="llmforge-facade-label" for="llmforgeSecret">Verify Secret</label>
  <input id="llmforgeSecret" class="llmforge-facade-input" type="text" placeholder="Paste candidate secret" />

  <div class="llmforge-facade-actions">
    <button id="llmforgeVerifyBtn" type="button">Check Secret</button>
  </div>

  <p id="llmforgeMeta" class="llmforge-facade-meta"></p>
  <pre id="llmforgeOutput" class="llmforge-facade-output"></pre>
</div>
