services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    ports:
      - "11434:11434"

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
      - MODEL_PROFILE=${MODEL_PROFILE:-phi3:mini}
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        echo "Waiting for Ollama server..."
        until ollama list > /dev/null 2>&1; do
          sleep 2
        done
        echo "Server ready. Pulling model '$MODEL_PROFILE'..."
        ollama pull $MODEL_PROFILE
        echo "Model pull complete."

  llmforge:
    build: .
    image: llmforge:dev
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${MODEL_PROFILE:-phi3:mini}
    depends_on:
      - ollama
      - ollama-init
    volumes:
      - .:/app:cached
    restart: unless-stopped

volumes:
  ollama_data:
