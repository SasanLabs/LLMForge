services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - MODEL_PROFILE=${MODEL_PROFILE:-phi3:mini}
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        set -eu
        model="${MODEL_PROFILE:-phi3:mini}"
        echo "Waiting for Ollama server..."
        until ollama list > /dev/null 2>&1; do
          sleep 2
        done
        echo "Server ready. Pulling model '$$model'..."
        ollama pull "$$model"
        echo "Model pull complete."

  llmforge:
    build: .
    image: llmforge:dev
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${MODEL_PROFILE:-phi3:mini}
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully
    volumes:
      - .:/app:cached
    restart: unless-stopped

volumes:
  ollama_data:
