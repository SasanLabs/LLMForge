services:
  # Ollama server
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    ports:
      - "11434:11434"

  # Dynamic Ollama init: pulls whatever profile/model you specify
  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
      - MODEL_PROFILE=${MODEL_PROFILE:-phi3:mini}  # default to mini
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        echo "Waiting for Ollama server..."
        until ollama list > /dev/null 2>&1; do
          sleep 2
        done
        echo "Server ready! Pulling model for profile '$MODEL_PROFILE'..."
        ollama pull $MODEL_PROFILE
        echo "Model $MODEL_PROFILE pulled successfully. Exiting init container."

  # Your FastAPI app (LLMForge)
  llmforge:
    build: .
    image: llmforge:dev
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${MODEL_PROFILE:-phi3:mini}  # Default matches init
    depends_on:
      - ollama
      - ollama-init
    volumes:
      - .:/app:cached
    restart: unless-stopped

volumes:
  ollama_data: