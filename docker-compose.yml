services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
  
  ollama-init-llama:
    image: ollama/ollama:latest
    profiles: ["llama"]
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434 # This tells it where to find the server
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        echo "Waiting for Ollama server..."
        until ollama list > /dev/null 2>&1; do
          sleep 2
        done
        echo "Server ready! Pulling llama3..."
        ollama pull llama3

  ollama-init-mistral:
    image: ollama/ollama:latest
    profiles: ["mistral"]
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434 # Crucial fix
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        echo "Waiting for Ollama server..."
        until ollama list > /dev/null 2>&1; do
          sleep 2
        done
        echo "Server ready! Pulling mistral..."
        ollama pull mistral

  ollama-init-mini:
    image: ollama/ollama:latest
    profiles: ["mini"]
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=ollama:11434
    entrypoint: /bin/sh
    command:
      - "-c"
      - |
        echo "Waiting for Ollama server..."
        until ollama list > /dev/null 2>&1; do
          sleep 2
        done
        echo "Server ready! Pulling mini..."
        ollama pull mini


  llmforge:
    build: .
    image: llmforge:dev
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
    depends_on:
      - ollama
    volumes:
      - .:/app:cached
    restart: unless-stopped

volumes:
  ollama_data: